<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Log In</title>
    <link rel="stylesheet" href="../styles/login.css?v=2">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FontAwesome Custom Styles -->
    <link rel="stylesheet" href="../styles/fontawesome-custom.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            corePlugins: { preflight: false }, // Don't override existing CSS resets
            prefix: 'tw-',
        }
    </script>
    <link rel="stylesheet" href="../styles/theme.css">
</head>
<body>

    <div class="phone-container">
        
        <!-- Top App Branding Bar Area -->
        <div class="nav-header">
            <div class="logo-block">
                <span id="brand-emoji"></span> 
                <span id="brand-text" onclick="window.location.href='index.html'" style="cursor:pointer;"></span>
            </div>
            <a href="help-center.html" class="help-link" id="nav-help-label"></a>
        </div>

        <!-- Form Onboarding Subtitles Row Header Group Container -->
        <div class="intro-summary-block">
            <h1 class="main-title" id="display-title"></h1>
            <p class="main-subtitle" id="display-subtitle"></p>
        </div>

        <!-- White Interactive Form Container Card -->
        <div class="registration-card">
            
            <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                
                <div class="form-group">
                    <label for="user-role" id="lbl-role">I am a:</label>
                    <select id="user-role" class="form-control" required>
                        <option value="">Select your role</option>
                        <option value="consumer">Consumer - I want to trace food origins</option>
                        <option value="farmer">Farmer - I want to record batches</option>
                        <option value="transporter">Transporter - I manage logistics</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="login-email" id="lbl-email"></label>
                    <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="login-password" id="lbl-pass"></label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                        <span class="password-toggle" onclick="togglePasswordInputMask()" title="Show/hide password" role="button" tabindex="0"><i class="fas fa-eye"></i></span>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit-txt"></button>
            </form>

            <div class="divider" id="display-divider"></div>
            
            <button type="button" class="btn-submit btn-google" onclick="window.location.href='signup.html'">
                <span id="google-btn-txt"></span>
            </button>

        </div>

        <!-- Baseline Redirection Footer Prompt -->
        <p class="footer-prompt" id="display-footer-box"></p>

    </div>

    <script src="../scripts/app.js"></script>
    <script>
        const pageSettings = {
            name: "ShambaChain",
            logo: '<i class="fas fa-tractor"></i>',
            helpText: "Help",
            headline: "Welcome back",
            tagline: "Log in to track batches, view histories, or manage your supply chain ledger.",
            lblEmail: "Email Address",
            lblRole: "I am a:",
            lblPassword: "Password",
            btnText: "Sign In →",
            dividerText: "Don't have an account?",
            btnGoogleText: "Sign Up",
            footerTargetUrl: "signup.html"
        };

        window.addEventListener('DOMContentLoaded', () => {
            // Redirect if already logged in
            if (Auth.isLoggedIn()) {
                const role = localStorage.getItem('selectedRole') || 'consumer';
                redirectByRole(role);
                return;
            }

            document.getElementById('brand-emoji').innerHTML = pageSettings.logo;
            document.getElementById('brand-text').innerText = pageSettings.name;
            document.getElementById('nav-help-label').innerText = pageSettings.helpText;
            document.getElementById('display-title').innerText = pageSettings.headline;
            document.getElementById('display-subtitle').innerText = pageSettings.tagline;
            document.getElementById('lbl-email').innerText = pageSettings.lblEmail;
            document.getElementById('lbl-role').innerText = pageSettings.lblRole;
            document.getElementById('lbl-pass').innerText = pageSettings.lblPassword;
            document.getElementById('btn-submit-txt').innerText = pageSettings.btnText;
            document.getElementById('display-divider').innerText = pageSettings.dividerText;
            document.getElementById('google-btn-txt').innerText = pageSettings.btnGoogleText;
            document.getElementById('display-footer-box').innerHTML =
                `Don't have an account? <a href="${pageSettings.footerTargetUrl}">Sign Up</a>`;
        });

        function togglePasswordInputMask() {
            const f = document.getElementById('login-password');
            f.type = f.type === 'password' ? 'text' : 'password';
        }

        function redirectByRole(role) {
            if (role === 'farmer') {
                window.location.href = 'farmer-portal.html';
            } else if (role === 'transporter') {
                window.location.href = 'transporter-hub.html';
            } else {
                window.location.href = 'consumer-dashboard.html';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = document.getElementById('loginForm');
            const btn  = document.getElementById('btn-submit-txt');
            const role = document.getElementById('user-role');
            const email    = document.getElementById('login-email');
            const password = document.getElementById('login-password');

            Form.clearAllErrors(form);

            // Basic client-side validation
            let valid = true;
            if (!role.value) {
                Form.setError(role, 'Please select your role.');
                valid = false;
            }
            if (!email.value.trim()) {
                Form.setError(email, 'Email is required.');
                valid = false;
            }
            if (!password.value) {
                Form.setError(password, 'Password is required.');
                valid = false;
            }
            if (!valid) return;

            Btn.setLoading(btn, true);

            try {
                const data = await Http.post('/auth/login', {
                    email: email.value.trim(),
                    password: password.value,
                });

                Auth.setToken(data.token);
                if (data.user) Auth.setUser(data.user);

                // Use selected role for routing
                localStorage.setItem('selectedRole', role.value);

                Toast.success('Login successful! Redirecting...');
                setTimeout(() => redirectByRole(role.value), 900);

            } catch (err) {
                Toast.error(err.message || 'Login failed. Please check your credentials.');
                Btn.setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
