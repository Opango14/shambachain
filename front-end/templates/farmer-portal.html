<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Producer Portal</title>
    <link rel="stylesheet" href="../styles/farmer-portal.css?v=3">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FontAwesome Custom Styles -->
    <link rel="stylesheet" href="../styles/fontawesome-custom.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false }, prefix: 'tw-' }</script>
    <link rel="stylesheet" href="../styles/theme.css">
</head>
<body>

    <div class="phone-container">

        <div class="drawer-overlay-tint" id="farmerOverlay" onclick="toggleFarmerNavigationDrawer(false)"></div>
        
        <div class="navigation-drawer-pane" id="farmerNavDrawer">
            <div class="drawer-header">
                <h4><i class="fas fa-tractor"></i> Farmer Menu</h4>
                <button class="btn-close-drawer" onclick="toggleFarmerNavigationDrawer(false)"><i class="fas fa-times"></i></button>
            </div>
            <div class="drawer-links-stack">
                <a href="farmer-portal.html" class="drawer-link-item"><span><i class="fas fa-tractor"></i></span> Record Batch</a>
                <a href="farmer-profile.html" class="drawer-link-item"><span><i class="fas fa-user"></i></span> My Profile</a>
                <a href="settings.html" class="drawer-link-item"><span><i class="fas fa-cog"></i></span> Farm Settings</a>
                <a href="consumer-dashboard.html" class="drawer-link-item" style="border-top:1px solid #e2e8f0;padding-top:16px;margin-top:20px;">
                    <span><i class="fas fa-search"></i></span> Switch to Consumer Mode
                </a>
                <a href="#" class="drawer-link-item" style="color:#b91c1c;" data-action="signout">
                    <span><i class="fas fa-sign-out-alt"></i></span> Sign Out
                </a>
            </div>
        </div>
        
        <div class="top-app-bar">
            <button class="menu-icon" onclick="toggleFarmerNavigationDrawer(true)"><i class="fas fa-bars"></i></button>
            <div class="app-bar-title" id="app-title-txt"></div>
            <button class="qr-shortcut" onclick="window.location.href='farmer-profile.html'"><i class="fas fa-user"></i></button>
        </div>

        <div class="portal-label-tag" id="display-portal-lbl"></div>
        <h1 class="farm-main-title" id="display-farm-name"></h1>
        
        <div class="farm-meta-row">
            <div class="verified-producer-badge">
                <span><i class="fas fa-check"></i></span> <span id="display-badge-txt"></span>
            </div>
            <span class="batch-id-text" id="display-batch-id-txt"></span>
        </div>

        <div class="portal-grid-layout-hub">
            
            <!-- COLUMN 1: Batch Registration Form -->
            <div>
                <div class="form-card-container">
                    <div class="form-card-header">
                        <span><i class="fas fa-plus-circle"></i></span> <span id="display-form-header"></span>
                    </div>

                    <form id="batchForm" onsubmit="handleBatchRegistration(event)" novalidate>
                        
                        <div class="form-group-block">
                            <label for="product-type" id="lbl-prod-type"></label>
                            <div class="input-icon-wrapper">
                                <span class="input-decor-icon"><i class="fas fa-box"></i></span>
                                <select id="product-type" class="portal-form-input" required></select>
                            </div>
                        </div>

                        <div class="form-group-block">
                            <label for="batch-quantity" id="lbl-quantity">Quantity (kg)</label>
                            <div class="input-icon-wrapper">
                                <span class="input-decor-icon"><i class="fas fa-weight-hanging"></i></span>
                                <input type="number" id="batch-quantity" class="portal-form-input" placeholder="e.g. 500" min="1" required>
                            </div>
                        </div>

                        <div class="form-group-block">
                            <label for="harvest-date" id="lbl-harv-date"></label>
                            <div class="input-icon-wrapper">
                                <span class="input-decor-icon"><i class="fas fa-calendar-alt"></i></span>
                                <input type="date" id="harvest-date" class="portal-form-input" required>
                            </div>
                        </div>

                        <div class="form-group-block">
                            <label for="field-location" id="lbl-field-loc"></label>
                            <div class="input-icon-wrapper">
                                <span class="input-decor-icon"><i class="fas fa-map-marker-alt"></i></span>
                                <input type="text" id="field-location" class="portal-form-input" placeholder="e.g. Ahero, Kisumu" required>
                            </div>
                        </div>

                        <div class="form-group-block">
                            <label for="farm-name-input">Farm Name</label>
                            <div class="input-icon-wrapper">
                                <span class="input-decor-icon"><i class="fas fa-seedling"></i></span>
                                <input type="text" id="farm-name-input" class="portal-form-input" placeholder="e.g. Green Valley Farm">
                            </div>
                        </div>

                        <button type="submit" class="btn-generate-qr" id="btn-submit-txt"><i class="fas fa-qrcode"></i> Generate & Register Batch</button>
                        <p class="action-helper-caption" id="display-helper-caption"></p>

                    </form>
                </div>

                <div class="field-preview-card">
                    <div class="coordinates-overlay-box">
                        <div class="coord-title-lbl" id="display-coord-lbl"></div>
                        <div class="coord-numeric-values" id="display-coord-vals"></div>
                    </div>
                </div>
            </div>

            <!-- COLUMN 2: Analytics & Ledger Table -->
            <div>
                <div class="live-harvest-analytics-card">
                    <div class="analytics-header-row">
                        <span class="shield-check-icon"><i class="fas fa-shield-alt"></i></span>
                        <span class="live-status-pill" id="display-live-status-lbl"></span>
                    </div>
                    <div class="analytics-massive-value" id="display-analytics-val"></div>
                    <div class="analytics-subtext-lbl" id="display-analytics-lbl"></div>
                </div>

                <div class="batch-ledger-table-card">
                    <div class="table-header-control-row">
                        <div class="table-main-title">
                            <span><i class="fas fa-link"></i></span> <div>Active Supply<br>Chain Batches</div>
                        </div>
                        <a href="farmer-inventory.html" class="table-action-link-btn" id="display-history-link-txt"></a>
                    </div>

                    <div class="ledger-columns-label-strip">
                        <span class="col-header-lbl-txt">Batch ID</span>
                        <span class="col-header-lbl-txt">Product</span>
                        <span class="col-header-lbl-txt">Status</span>
                        <span class="col-header-lbl-txt" style="text-align:right;">Verific</span>
                    </div>

                    <div id="table-rows-container">
                        <div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px;">Loading batches...</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="app-bottom-dock">
            <a href="farmer-portal.html" class="dock-tab-link active-pill-state">
                <div class="pill-overlay-badge"><i class="fas fa-map-marker-alt"></i></div>
                <span>Trace</span>
            </a>
            <a href="farmer-profile.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-history"></i></span>
                <span>History</span>
            </a>
            <a href="farmer-inventory.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-book"></i></span>
                <span>Ledger</span>
            </a>
            <a href="settings.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-cog"></i></span>
                <span>Settings</span>
            </a>
        </div>

    </div>

    <script src="../scripts/app.js"></script>
    <script>
        function toggleFarmerNavigationDrawer(open) {
            document.getElementById('farmerOverlay').classList.toggle('panel-active-state', open);
            document.getElementById('farmerNavDrawer').classList.toggle('panel-active-state', open);
        }

        const farmConfig = {
            appName: "ShambaChain",
            portalLabel: "Farmer Portal",
            farmName: "Green Valley Farm",
            badgeText: "Verified Producer",
            batchNumberText: "Batch ID: —",
            formTitle: "Record New Batch",
            lblProductType: "Product Type",
            lblHarvestDate: "Harvest Date",
            lblLocation: "Location / Field Block",
            btnSubmitText: "<i class='fas fa-qrcode'></i> Generate & Register Batch",
            helperCaptionText: "This will register the batch on-chain and generate a QR code.",
            coordLabel: "Origin Coordinates",
            coordValues: "Detecting location...",
            liveLabel: "LIVE",
            analyticsValue: "—",
            analyticsLabel: "Total Tracked Harvest",
            historyLinkText: "View Inventory →"
        };

        const dropdownOptions = [
            { value: "Arabica Coffee",    label: "Arabica Coffee" },
            { value: "Pishori Rice",      label: "Pishori Rice" },
            { value: "Kinangop Potatoes", label: "Kinangop Potatoes" },
            { value: "Lake Tilapia",      label: "Lake Tilapia" },
            { value: "Kitale Maize",      label: "Kitale Maize" },
            { value: "Organic Avocado",   label: "Organic Avocado" },
            { value: "Cacao Beans",       label: "Cacao Beans" },
        ];

        window.addEventListener('DOMContentLoaded', () => {
            requireAuth();

            document.getElementById('app-title-txt').innerText = farmConfig.appName;
            document.getElementById('display-portal-lbl').innerText = farmConfig.portalLabel;
            document.getElementById('display-farm-name').innerText = farmConfig.farmName;
            document.getElementById('display-badge-txt').innerText = farmConfig.badgeText;
            document.getElementById('display-batch-id-txt').innerText = farmConfig.batchNumberText;
            document.getElementById('display-form-header').innerText = farmConfig.formTitle;
            document.getElementById('lbl-prod-type').innerText = farmConfig.lblProductType;
            document.getElementById('lbl-harv-date').innerText = farmConfig.lblHarvestDate;
            document.getElementById('lbl-field-loc').innerText = farmConfig.lblLocation;
            document.getElementById('btn-submit-txt').innerText = farmConfig.btnSubmitText;
            document.getElementById('display-helper-caption').innerText = farmConfig.helperCaptionText;
            document.getElementById('display-coord-lbl').innerText = farmConfig.coordLabel;
            document.getElementById('display-coord-vals').innerText = farmConfig.coordValues;
            document.getElementById('display-live-status-lbl').innerText = farmConfig.liveLabel;
            document.getElementById('display-analytics-val').innerText = farmConfig.analyticsValue;
            document.getElementById('display-analytics-lbl').innerText = farmConfig.analyticsLabel;
            document.getElementById('display-history-link-txt').innerText = farmConfig.historyLinkText;

            // Set today as default harvest date
            document.getElementById('harvest-date').value = new Date().toISOString().split('T')[0];

            // Populate product dropdown
            const dropdown = document.getElementById('product-type');
            dropdown.innerHTML = '';
            dropdownOptions.forEach(opt => {
                dropdown.innerHTML += `<option value="${opt.value}">${opt.label}</option>`;
            });

            // Try geolocation
            Location.updateLocationDisplay('display-coord-vals', 'Location unavailable');

            // Load marketplace batches for the table
            loadMarketplaceBatches();
        });

        async function loadMarketplaceBatches() {
            const container = document.getElementById('table-rows-container');
            try {
                const data = await Http.get('/marketplace');
                const batches = data.products || [];

                if (batches.length === 0) {
                    container.innerHTML = `<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px;">No batches registered yet.</div>`;
                    return;
                }

                container.innerHTML = '';
                batches.slice(0, 5).forEach(b => {
                    container.innerHTML += `
                        <div class="ledger-data-row" onclick="window.location.href='farmer-inventory.html'" style="cursor:pointer;">
                            <div class="cell-bold-id">#${String(b.id || b.batch_id || '—').slice(0, 8)}</div>
                            <div class="cell-product-meta-block">
                                <span class="crop-name-txt">${b.produce_type || b.ProduceType || '—'}</span>
                                <span class="crop-sub-weights-lbl">${b.quantity || b.Quantity || '—'} ${b.unit || b.Unit || 'kg'}</span>
                            </div>
                            <div class="status-dot-indicator-cell">
                                <span class="dot-marker dot-green"></span> Active
                            </div>
                            <div style="text-align:right;">
                                <span class="onchain-capsule-badge"><i class="fas fa-check"></i> ON-C</span>
                            </div>
                        </div>
                    `;
                });

                // Update analytics total
                const totalKg = batches.reduce((sum, b) => sum + (parseFloat(b.quantity || b.Quantity) || 0), 0);
                document.getElementById('display-analytics-val').innerText = `${totalKg.toLocaleString()} kg`;
                document.getElementById('display-analytics-lbl').innerText = 'Total Registered Harvest';

            } catch (err) {
                container.innerHTML = `<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px;">Could not load batches.</div>`;
            }
        }

        async function handleBatchRegistration(e) {
            e.preventDefault();
            const form = document.getElementById('batchForm');
            const btn  = document.getElementById('btn-submit-txt');

            Form.clearAllErrors(form);

            const produceType  = document.getElementById('product-type').value;
            const quantityEl   = document.getElementById('batch-quantity');
            const harvestDateEl = document.getElementById('harvest-date');
            const locationEl   = document.getElementById('field-location');
            const farmNameEl   = document.getElementById('farm-name-input');

            let valid = true;
            if (!quantityEl.value || parseFloat(quantityEl.value) <= 0) {
                Form.setError(quantityEl, 'Enter a valid quantity.');
                valid = false;
            }
            if (!harvestDateEl.value) {
                Form.setError(harvestDateEl, 'Harvest date is required.');
                valid = false;
            }
            if (!locationEl.value.trim()) {
                Form.setError(locationEl, 'Location is required.');
                valid = false;
            }
            if (!valid) return;

            Btn.setLoading(btn, true);

            // Get location data
            const locationData = await Location.getLocationForBatch();

            try {
                const response = await Http.post('/batches', {
                    produce_type: produceType,
                    quantity: parseFloat(quantityEl.value),
                    unit: 'kg',
                    harvest_date: new Date(harvestDateEl.value).toISOString(),
                    location: locationEl.value.trim(),
                    farm_name: farmNameEl.value.trim() || farmConfig.farmName,
                    coordinates: locationData ? {
                        latitude: locationData.latitude,
                        longitude: locationData.longitude
                    } : null,
                }, true); // requires auth

                Toast.success(`Batch registered! ID: ${response.batch_id || response.id || '✓'}`);
                form.reset();
                document.getElementById('harvest-date').value = new Date().toISOString().split('T')[0];

                // Refresh the table
                setTimeout(loadMarketplaceBatches, 800);

                // Navigate to details after short delay
                setTimeout(() => {
                    window.location.href = 'register-batch-detail.html';
                }, 1800);

            } catch (err) {
                Toast.error(err.message || 'Failed to register batch. Please try again.');
                Btn.setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
