<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Register Account</title>
    <link rel="stylesheet" href="../styles/signup.css?v=2">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FontAwesome Custom Styles -->
    <link rel="stylesheet" href="../styles/fontawesome-custom.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false }, prefix: 'tw-' }</script>
    <link rel="stylesheet" href="../styles/theme.css">
</head>
<body>

    <div class="phone-container">
        
        <div class="nav-header">
            <div class="logo-block">
                <span id="brand-emoji"></span> 
                <span id="brand-text"></span>
            </div>
            <a href="help-center.html" class="help-link" id="nav-help-label"></a>
        </div>

        <div class="intro-summary-block">
            <h1 class="main-title" id="display-title"></h1>
            <p class="main-subtitle" id="display-subtitle"></p>
        </div>

        <div class="registration-card">
            
            <div class="step-indicator">
                <div class="indicator-bar active"></div>
                <div class="indicator-bar active"></div>
            </div>

            <!-- Role Tabs -->
            <div class="toggle-container">
                <button type="button" class="toggle-tab" id="tab-consumer" onclick="toggleActiveRoleState('consumer')"></button>
                <button type="button" class="toggle-tab" id="tab-farmer" onclick="toggleActiveRoleState('farmer')"></button>
                <button type="button" class="toggle-tab" id="tab-transporter" onclick="toggleActiveRoleState('transporter')"></button>
            </div>

            <form id="signupForm" onsubmit="handleRegister(event)" novalidate>
                
                <div class="form-group">
                    <label for="reg-username" id="lbl-user"></label>
                    <input type="text" id="reg-username" class="form-control" placeholder="e.g. jirani_farm" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="reg-email" id="lbl-email"></label>
                    <input type="email" id="reg-email" class="form-control" placeholder="name@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="reg-password" id="lbl-pass"></label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                        <span class="password-toggle" onclick="togglePasswordInputMask('reg-password')" role="button" tabindex="0"><i class="fas fa-eye"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-confirm" id="lbl-confirm"></label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-confirm" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                        <span class="password-toggle" onclick="togglePasswordInputMask('reg-confirm')" role="button" tabindex="0"><i class="fas fa-eye"></i></span>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit-txt"></button>
            </form>

        </div>

        <p class="footer-prompt" id="display-footer-box"></p>

    </div>

    <script src="../scripts/app.js"></script>
    <script>
        const pageSettings = {
            name: "ShambaChain",
            logo: '<i class="fas fa-tractor"></i>',
            helpText: "Help",
            headline: "Create your account",
            tagline: "Join the global network of transparent food supply chains.",
            tabConsumerLabel: "Consumer Hub",
            tabFarmerLabel: "Producer Hub",
            tabTransporterLabel: "Logistics Hub",
            lblUsername: "Username",
            lblEmail: "Email Address",
            lblPassword: "Password",
            lblConfirmPassword: "Confirm Password",
            btnText: "Create Account",
            footerTargetUrl: "login.html"
        };

        let activeWorkspaceRole = 'consumer'; // Default to consumer

        window.addEventListener('DOMContentLoaded', () => {
            // Redirect if already logged in
            if (!checkAuthAndRedirect()) return;

            document.getElementById('brand-emoji').innerHTML = pageSettings.logo;
            document.getElementById('brand-text').innerText = pageSettings.name;
            document.getElementById('nav-help-label').innerText = pageSettings.helpText;
            document.getElementById('display-title').innerText = pageSettings.headline;
            document.getElementById('display-subtitle').innerText = pageSettings.tagline;
            document.getElementById('tab-consumer').innerText = pageSettings.tabConsumerLabel;
            document.getElementById('tab-farmer').innerText = pageSettings.tabFarmerLabel;
            document.getElementById('tab-transporter').innerText = pageSettings.tabTransporterLabel;
            document.getElementById('lbl-user').innerText = pageSettings.lblUsername;
            document.getElementById('lbl-email').innerText = pageSettings.lblEmail;
            document.getElementById('lbl-pass').innerText = pageSettings.lblPassword;
            document.getElementById('lbl-confirm').innerText = pageSettings.lblConfirmPassword;
            document.getElementById('btn-submit-txt').innerText = pageSettings.btnText;
            document.getElementById('display-footer-box').innerHTML =
                `Already have an account? <a href="${pageSettings.footerTargetUrl}">Log In</a>`;

            const cachedChoice = localStorage.getItem('selectedRole');
            toggleActiveRoleState(cachedChoice || 'consumer');
        });

        function toggleActiveRoleState(role) {
            activeWorkspaceRole = role;
            localStorage.setItem('selectedRole', role);
            ['consumer', 'farmer', 'transporter'].forEach(r => {
                document.getElementById(`tab-${r}`).classList.toggle('active', r === role);
            });
        }

        function togglePasswordInputMask(id) {
            const f = document.getElementById(id);
            f.type = f.type === 'password' ? 'text' : 'password';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const form     = document.getElementById('signupForm');
            const btn      = document.getElementById('btn-submit-txt');
            const username = document.getElementById('reg-username');
            const email    = document.getElementById('reg-email');
            const password = document.getElementById('reg-password');
            const confirm  = document.getElementById('reg-confirm');

            Form.clearAllErrors(form);

            let valid = true;
            if (!activeWorkspaceRole) {
                Toast.error('Please select a role (Consumer, Farmer, or Transporter).');
                valid = false;
            }
            if (!username.value.trim()) {
                Form.setError(username, 'Username is required.');
                valid = false;
            }
            if (!email.value.trim()) {
                Form.setError(email, 'Email is required.');
                valid = false;
            }
            if (password.value.length < 6) {
                Form.setError(password, 'Password must be at least 6 characters.');
                valid = false;
            }
            if (password.value !== confirm.value) {
                Form.setError(confirm, 'Passwords do not match.');
                valid = false;
            }
            if (!valid) return;

            Btn.setLoading(btn, true);

            // Debug: Log the data being sent
            const registrationData = {
                username: username.value.trim(),
                email: email.value.trim(),
                password: password.value,
                role: activeWorkspaceRole,
            };
            console.log('Registration data:', registrationData);

            try {
                await Http.post('/auth/register', registrationData);

                Toast.success('Account created! Logging you in...');

                // Auto-login after registration
                const loginData = await Http.post('/auth/login', {
                    email: email.value.trim(),
                    password: password.value,
                });

                Auth.setToken(loginData.token);
                if (loginData.user) Auth.setUser(loginData.user);
                localStorage.setItem('cachedUsername', username.value.trim());

                setTimeout(() => {
                    if (activeWorkspaceRole === 'farmer') {
                        window.location.href = 'farmer-portal.html';
                    } else if (activeWorkspaceRole === 'transporter') {
                        window.location.href = 'transporter-hub.html';
                    } else {
                        window.location.href = 'consumer-dashboard.html';
                    }
                }, 900);

            } catch (err) {
                console.error('Registration error:', err);
                Toast.error(err.message || 'Registration failed. Please try again.');
                Btn.setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
