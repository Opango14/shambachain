<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Sign Up</title>
    <link rel="stylesheet" href="../styles/signup.css">
</head>
<body>

    <div class="phone-container">
        
        <!-- Top App Branding Bar Area -->
        <div class="nav-header">
            <div class="logo-block">
                <span>🚜</span> ShambaChain
            </div>
            <a href="#" class="help-link">Help</a>
        </div>

        <h1 class="main-title">Create your account</h1>
        <p class="main-subtitle">Join the global network of transparent food supply chains.</p>

        <!-- White Interactive Registration Panel Card Container -->
        <div class="registration-card">
            
            <!-- Two-Step Progress Bar Indicator (Step 2 Active) -->
            <div class="step-indicator">
                <div class="indicator-bar active"></div>
                <div class="indicator-bar active"></div>
            </div>

            <!-- Role Selector Tabs -->
            <div class="toggle-container">
                <button type="button" class="toggle-tab" id="tab-consumer" onclick="switchRole('consumer')">Consumer</button>
                <button type="button" class="toggle-tab" id="tab-farmer" onclick="switchRole('farmer')">Farmer/Producer</button>
            </div>

            <!-- Signup Form Elements -->
            <form id="signupForm" onsubmit="executeRegistration(event)">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" class="form-control" placeholder="e.g. jirani_farm" required>
                </div>

                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
                        <span class="password-toggle" onclick="togglePassVisibility('reg-password')">👁️</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-confirm" class="form-control" placeholder="••••••••" required>
                        <span class="password-toggle" onclick="togglePassVisibility('reg-confirm')">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

        </div>

        <p class="footer-prompt">
            Already have an account? <a href="login.html">Log In</a>
        </p>

    </div>

    <!-- Dynamic JavaScript Routing Logic -->
    <script>
        let currentRole = 'consumer';

        // Read URL Parameters to see what the user picked on page 1
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const selectedRole = urlParams.get('role');
            if (selectedRole === 'farmer') {
                switchRole('farmer');
            } else {
                switchRole('consumer');
            }
        });

        // Toggle visual active state between Consumer / Farmer forms
        function switchRole(role) {
            currentRole = role;
            document.getElementById('tab-consumer').classList.remove('active');
            document.getElementById('tab-farmer').classList.remove('active');

            if (role === 'consumer') {
                document.getElementById('tab-consumer').classList.add('active');
            } else {
                document.getElementById('tab-farmer').classList.add('active');
            }
        }

        // Show/hide password utility helper
        function togglePassVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            if (field.type === "password") {
                field.type = "text";
            } else {
                field.type = "password";
            }
        }

        // Simulate form processing submission link out
        function executeRegistration(e) {
            e.preventDefault();
            
            // Redirect based on the active role tab
            if (currentRole === 'farmer') {
                window.location.href = 'farmer-dashboard.html';
            } else {
                window.location.href = 'consumer-dashboard.html';
            }
        }
    </script>
</body>
</html>
