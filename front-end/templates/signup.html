<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Register Account</title>
    <!-- Relative path back out to the parent styles sub-directory directory -->
    <link rel="stylesheet" href="../styles/signup.css?v=2">
</head>
<body>

    <div class="phone-container">
        
        <!-- Top App Branding Bar Area -->
        <div class="nav-header">
            <div class="logo-block">
                <span id="brand-emoji"></span> 
                <span id="brand-text"></span>
            </div>
            <a href="help-center.html" class="help-link" id="nav-help-label"></a>
        </div>

        <!-- Form Onboarding Subtitles Row Header Group Container -->
        <div class="intro-summary-block">
            <h1 class="main-title" id="display-title"></h1>
            <p class="main-subtitle" id="display-subtitle"></p>
        </div>

        <!-- White Interactive Form Surface Panel Container -->
        <div class="registration-card">
            
            <!-- Two-Step Progress Bar Indicator -->
            <div class="step-indicator">
                <div class="indicator-bar active"></div>
                <div class="indicator-bar active"></div>
            </div>

            <!-- Role Tabs Toggle Selector Buttons Grid Row (UPDATED: Added Transporter Tab) -->
            <div class="toggle-container">
                <button type="button" class="toggle-tab" id="tab-consumer" onclick="toggleActiveRoleState('consumer')"></button>
                <button type="button" class="toggle-tab" id="tab-farmer" onclick="toggleActiveRoleState('farmer')"></button>
                <button type="button" class="toggle-tab" id="tab-transporter" onclick="toggleActiveRoleState('transporter')"></button>
            </div>

            <!-- Entry Core Input Controls Form Element -->
            <form id="signupForm" onsubmit="executeOnChainRegistration(event)">
                
                <div class="form-group">
                    <label for="reg-username" id="lbl-user"></label>
                    <input type="text" id="reg-username" class="form-control" placeholder="e.g. jirani_farm" required>
                </div>

                <div class="form-group">
                    <label for="reg-email" id="lbl-email"></label>
                    <input type="email" id="reg-email" class="form-control" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="reg-password" id="lbl-pass"></label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
                        <span class="password-toggle" onclick="togglePasswordInputMask('reg-password')">👁️</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-confirm" id="lbl-confirm"></label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-confirm" class="form-control" placeholder="••••••••" required>
                        <span class="password-toggle" onclick="togglePasswordInputMask('reg-confirm')">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit-txt"></button>
            </form>

        </div>

        <!-- Baseline Redirection Footer Prompt -->
        <p class="footer-prompt" id="display-footer-box">
            <!-- Text layout elements generated cleanly by the runtime system script below -->
        </p>

    </div>

    <!-- DECOUPLED RUNTIME DATA HUB & VALIDATION ENGINE -->
    <script>
        // --- BACKEND API REPLICATED DATA DICTIONARIES ---
        const pageSettings = {
            name: "ShambaChain",
            logo: "🚜",
            helpText: "Help",
            headline: "Create your account",
            tagline: "Join the global network of transparent food supply chains.",
            tabConsumerLabel: "Consumer Hub",
            tabFarmerLabel: "Producer Hub",
            tabTransporterLabel: "Logistics Hub", // Added label string
            lblUsername: "Username",
            lblEmail: "Email Address",
            lblPassword: "Password",
            lblConfirmPassword: "Confirm Password",
            btnText: "Create Account",
            footerPromptText: "Already have an account?",
            footerLinkText: "Log In",
            footerTargetUrl: "login.html"
        };

        // Keeps track of runtime state selection parameters
        let activeWorkspaceRole = 'consumer';

        // --- CORE INTERFACE INJECTION ENGINE ---
        window.addEventListener('DOMContentLoaded', () => {
            // Mapping schema configurations across structural element targets
            document.getElementById('brand-emoji').innerText = pageSettings.logo;
            document.getElementById('brand-text').innerText = pageSettings.name;
            document.getElementById('nav-help-label').innerText = pageSettings.helpText;
            document.getElementById('display-title').innerText = pageSettings.headline;
            document.getElementById('display-subtitle').innerText = pageSettings.tagline;
            document.getElementById('tab-consumer').innerText = pageSettings.tabConsumerLabel;
            document.getElementById('tab-farmer').innerText = pageSettings.tabFarmerLabel;
            document.getElementById('tab-transporter').innerText = pageSettings.tabTransporterLabel;
            document.getElementById('lbl-user').innerText = pageSettings.lblUsername;
            document.getElementById('lbl-email').innerText = pageSettings.lblEmail;
            document.getElementById('lbl-pass').innerText = pageSettings.lblPassword;
            document.getElementById('lbl-confirm').innerText = pageSettings.lblConfirmPassword;
            document.getElementById('btn-submit-txt').innerText = pageSettings.btnText;

            // Generate footer layout structure nodes
            const footerContainer = document.getElementById('display-footer-box');
            footerContainer.innerHTML = `${pageSettings.footerPromptText} <a href="${pageSettings.footerTargetUrl}">${pageSettings.footerLinkText}</a>`;

            // READ INITIAL CHOICE: Read state variables from homepage localStorage session storage safely
            const cachedChoice = localStorage.getItem('selectedRole');
            if (cachedChoice === 'farmer') {
                toggleActiveRoleState('farmer');
            } else if (cachedChoice === 'transporter') {
                toggleActiveRoleState('transporter');
            } else {
                toggleActiveRoleState('consumer');
            }
        });

        // --- VISUAL CONTROL STATE TOGGLERS ---
        function toggleActiveRoleState(targetRoleModeId) {
            activeWorkspaceRole = targetRoleModeId;
            
            // Sync current configuration status to session variables memory trace cache
            localStorage.setItem('selectedRole', targetRoleModeId);

            // Fetch and flush style assignments across toggle pills
            document.getElementById('tab-consumer').classList.remove('active');
            document.getElementById('tab-farmer').classList.remove('active');
            document.getElementById('tab-transporter').classList.remove('active');

            if (targetRoleModeId === 'consumer') {
                document.getElementById('tab-consumer').classList.add('active');
            } else if (targetRoleModeId === 'farmer') {
                document.getElementById('tab-farmer').classList.add('active');
            } else {
                document.getElementById('tab-transporter').classList.add('active');
            }
        }

        // Show/hide password input mask tool
        function togglePasswordInputMask(inputElementFieldId) {
            const targetField = document.getElementById(inputElementFieldId);
            targetField.type = (targetField.type === "password") ? "text" : "password";
        }

        // --- BACKEND PIPELINE SIMULATION TRIGGER ---
        function executeOnChainRegistration(e) {
            e.preventDefault();
            
            // Capture standard validation entries to memory spaces
            const usernameInput = document.getElementById('reg-username').value;
            localStorage.setItem('cachedUsername', usernameInput);

            // Contextual dynamic routing: forwards users based on their active workspace configuration pill
            if (activeWorkspaceRole === 'farmer') {
                window.location.href = 'farmer-portal.html';
            } else if (activeWorkspaceRole === 'transporter') {
                window.location.href = 'transporter-hub.html'; // Points to newly identified logistics dashboard file
            } else {
                window.location.href = 'consumer-dashboard.html';
            }
        }
    </script>
</body>
</html>
