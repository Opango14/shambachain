<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Trace Hub</title>
    <link rel="stylesheet" href="../styles/consumer-dashboard.css?v=3">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FontAwesome Custom Styles -->
    <link rel="stylesheet" href="../styles/fontawesome-custom.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false }, prefix: 'tw-' }</script>
    <link rel="stylesheet" href="../styles/theme.css">
</head>
<body>

    <div class="phone-container">
        
        <div class="top-app-bar">
            <button class="menu-icon" onclick="toggleDashboardNavigationDrawer(true)"><i class="fas fa-bars"></i></button>
            <div class="app-bar-title" id="app-title-txt"></div>
            <button class="qr-shortcut" onclick="window.location.href='scanner.html'"><i class="fas fa-qrcode"></i></button>
        </div>

        <!-- Slide-out Navigation Drawer -->
        <div class="drawer-overlay-tint" id="dashboardOverlay" onclick="toggleDashboardNavigationDrawer(false)"></div>
        
        <div class="navigation-drawer-pane" id="dashboardNavDrawer">
            <div class="drawer-header">
                <h4 id="menu-drawer-title"><i class="fas fa-tractor"></i> ShambaMenu</h4>
                <button class="btn-close-drawer" onclick="toggleDashboardNavigationDrawer(false)"><i class="fas fa-times"></i></button>
            </div>
            <div class="drawer-links-stack">
                <a href="details.html" class="drawer-link-item"><span><i class="fas fa-search"></i></span> Trace Produce</a>
                <a href="search-traceability.html" class="drawer-link-item"><span><i class="fas fa-search-plus"></i></span> Search Engine</a>
                <a href="help-center.html" class="drawer-link-item"><span><i class="fas fa-question-circle"></i></span> Help Center</a>
                <a href="#" class="drawer-link-item" data-action="signout"
                    style="color:#b91c1c;margin-top:40px;border-top:1px dashed #e2e8f0;padding-top:16px;">
                    <span><i class="fas fa-sign-out-alt"></i></span> Sign Out
                </a>
            </div>
        </div>

        <!-- Hero + Metrics -->
        <div class="dashboard-top-flex-panel">
            <div class="hero-image-card">
                <h2 id="hero-headline"></h2>
                <p id="hero-tagline"></p>
                <a href="scanner.html" class="btn-scan-bar" id="btn-scan-lbl"></a>
            </div>
            <div class="metrics-row" id="metrics-cards-grid"></div>
        </div>

        <!-- Featured Produce from Marketplace API -->
        <div class="section-headline-bar">
            <h3 id="sec-featured-lbl"></h3>
            <a href="search-traceability.html" class="view-all" id="sec-featured-link"></a>
        </div>
        <div class="carousel-viewport" id="featured-produce-carousel">
            <div style="padding:16px;color:#94a3b8;font-size:13px;">Loading produce...</div>
        </div>

        <!-- Recent Scans -->
        <div class="scans-section-container">
            <div class="section-headline-bar">
                <h3 id="sec-history-lbl"></h3>
                <a href="#" class="view-all" onclick="clearLocalHistoryLogs(event)" style="color:#b91c1c;">Clear</a>
            </div>
            <div id="recent-scans-list-feed"></div>
        </div>

        <div class="app-bottom-dock">
            <a href="consumer-dashboard.html" class="dock-tab-link active-pill-state">
                <div class="pill-overlay-badge"><i class="fas fa-home"></i></div>
                <span>Home</span>
            </a>
            <a href="details.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-history"></i></span>
                <span>History</span>
            </a>
            <a href="#" class="dock-tab-link" onclick="Toast.info('Blockchain explorer coming soon!')">
                <span class="unselected-icon-spacing"><i class="fas fa-link"></i></span>
                <span>Ledger</span>
            </a>
            <a href="consumer_profile.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-user"></i></span>
                <span>Profile</span>
            </a>
        </div>

    </div>

    <script src="../scripts/app.js"></script>
    <script>
        const dashboardSettings = {
            appName: "ShambaChain",
            bannerTitle: "Trace Your Food",
            bannerDesc: "Verify the origin and journey of your produce directly on-chain.",
            scanBtnText: "Scan Product QR",
            lblFeatured: "Live Marketplace",
            linkFeaturedText: "Search All →",
            lblHistory: "Recent Scans"
        };

        const networkMetrics = [
            { title: "Trust Score", value: "Verified", marker: '<i class="fas fa-shield-alt"></i>', badge: "100%" },
            { title: "Nodes Active", value: "1,204", marker: '<i class="fas fa-link"></i>', badge: "Live" }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            // Check authentication before loading page
            if (!checkAuthAndRedirect()) return;
            
            document.getElementById('app-title-txt').innerText = dashboardSettings.appName;
            document.getElementById('hero-headline').innerText = dashboardSettings.bannerTitle;
            document.getElementById('hero-tagline').innerText = dashboardSettings.bannerDesc;
            document.getElementById('btn-scan-lbl').innerText = dashboardSettings.scanBtnText;
            document.getElementById('sec-featured-lbl').innerText = dashboardSettings.lblFeatured;
            document.getElementById('sec-featured-link').innerText = dashboardSettings.linkFeaturedText;
            document.getElementById('sec-history-lbl').innerText = dashboardSettings.lblHistory;

            // Metrics
            const metricsGrid = document.getElementById('metrics-cards-grid');
            metricsGrid.innerHTML = '';
            networkMetrics.forEach(box => {
                metricsGrid.innerHTML += `
                    <div class="metric-box">
                        <div class="metric-top-line">
                            <span style="color:#115e59;font-size:16px;">${box.marker}</span>
                            <span class="metric-badge-label">${box.badge}</span>
                        </div>
                        <div>
                            <div class="metric-sub-label">${box.title}</div>
                            <div class="metric-main-value">${box.value}</div>
                        </div>
                    </div>
                `;
            });

            // Load real marketplace data
            loadMarketplaceCarousel();
            renderScanHistoryListLog();
        });

        // Curated Unsplash images per crop type (free, no API key needed)
        const cropImages = {
            coffee:     'https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=400&q=80&fit=crop',
            rice:       'https://images.unsplash.com/photo-1536304993881-ff86e0c9b7b5?w=400&q=80&fit=crop',
            potato:     'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&q=80&fit=crop',
            maize:      'https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=400&q=80&fit=crop',
            avocado:    'https://images.unsplash.com/photo-1523049673857-eb18f1d7b578?w=400&q=80&fit=crop',
            tilapia:    'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=400&q=80&fit=crop',
            cacao:      'https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=400&q=80&fit=crop',
            default:    'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&q=80&fit=crop',
        };

        function getCropImage(name) {
            const key = (name || '').toLowerCase();
            for (const [k, url] of Object.entries(cropImages)) {
                if (key.includes(k)) return url;
            }
            return cropImages.default;
        }

        async function loadMarketplaceCarousel() {
            const carousel = document.getElementById('featured-produce-carousel');
            try {
                const data = await Http.get('/marketplace');
                const products = data.products || [];

                if (products.length === 0) {
                    carousel.innerHTML = `<div style="padding:16px;color:#94a3b8;font-size:13px;">No produce listed yet.</div>`;
                    return;
                }

                carousel.innerHTML = '';
                products.slice(0, 6).forEach(item => {
                    const name = item.produce_type || item.ProduceType || 'Produce';
                    const batchId = item.batch_id || item.id || '';
                    const imgUrl = getCropImage(name);

                    carousel.innerHTML += `
                        <a href="search-traceability.html" class="carousel-crop-card"
                            onclick="sessionStorage.setItem('sc_scan_result','${batchId}')">
                            <div class="crop-image-frame" style="background-image:url('${imgUrl}');background-size:cover;background-position:center;position:relative;">
                                <div class="authentic-overlay-badge"><i class="fas fa-check"></i> LIVE</div>
                            </div>
                            <div class="crop-footer-details">
                                <div class="crop-name-label">${name}</div>
                                <div style="font-size:11px;color:#64748b;">${item.quantity || item.Quantity || '—'} ${item.unit || 'kg'} · ${item.location || item.Location || '—'}</div>
                            </div>
                        </a>
                    `;
                });
            } catch {
                carousel.innerHTML = `<div style="padding:16px;color:#94a3b8;font-size:13px;">Could not load marketplace data.</div>`;
            }
        }

        function getScanHistory() {
            try { return JSON.parse(localStorage.getItem('sc_scan_history') || '[]'); }
            catch { return []; }
        }

        function renderScanHistoryListLog() {
            const feedContainer = document.getElementById('recent-scans-list-feed');
            const history = getScanHistory();
            feedContainer.innerHTML = '';
            if (history.length === 0) {
                feedContainer.innerHTML = `<div style="padding:16px;color:#94a3b8;font-size:13px;">No recent scans. Use the scanner to trace produce.</div>`;
                return;
            }
            history.forEach(row => {
                feedContainer.innerHTML += `
                    <a href="details.html" class="scan-history-row">
                        <div class="scan-item-profile">
                            <div class="scan-icon-wrapper"><i class="fas fa-search"></i></div>
                            <div>
                                <div class="scan-headline-text">${row.name}</div>
                                <div class="scan-sub-meta">${row.time} · ID: ${row.id}</div>
                            </div>
                        </div>
                        <div class="chevron-arrow"><i class="fas fa-chevron-right"></i></div>
                    </a>
                `;
            });
        }

        function clearLocalHistoryLogs(e) {
            e.preventDefault();
            localStorage.removeItem('sc_scan_history');
            renderScanHistoryListLog();
            Toast.info('Scan history cleared.');
        }

        function toggleDashboardNavigationDrawer(open) {
            document.getElementById('dashboardOverlay').classList.toggle('panel-active-state', open);
            document.getElementById('dashboardNavDrawer').classList.toggle('panel-active-state', open);
        }
    </script>
</body>
</html>
