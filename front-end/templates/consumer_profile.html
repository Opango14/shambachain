<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Profile</title>
    <link rel="stylesheet" href="../styles/consumer-dashboard.css?v=3">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FontAwesome Custom Styles -->
    <link rel="stylesheet" href="../styles/fontawesome-custom.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false }, prefix: 'tw-' }</script>
    <link rel="stylesheet" href="../styles/theme.css">
</head>
<body>

    <div class="phone-container">
        
        <div class="top-app-bar">
            <button class="menu-icon" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <div class="app-bar-title">Profile</div>
            <button class="qr-shortcut" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i></button>
        </div>

        <!-- Profile Content -->
        <div style="padding: 20px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: #22c55e; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <i class="fas fa-user" style="font-size: 32px; color: white;"></i>
                </div>
                <h2 id="user-name">Consumer Profile</h2>
                <p id="user-email" style="color: #64748b;">Not logged in</p>
            </div>

            <div style="background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h3 style="margin-bottom: 16px; color: #022c22;"><i class="fas fa-chart-line"></i> Activity Summary</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div style="text-align: center;">
                        <div style="font-size: 24px; font-weight: bold; color: #22c55e;">0</div>
                        <div style="font-size: 12px; color: #64748b;">Scans</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 24px; font-weight: bold; color: #22c55e;">0</div>
                        <div style="font-size: 12px; color: #64748b;">Traces</div>
                    </div>
                </div>
            </div>

            <div style="background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h3 style="margin-bottom: 16px; color: #022c22;"><i class="fas fa-cog"></i> Account Settings</h3>
                <a href="settings.html" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #e2e8f0; text-decoration: none; color: #374151;">
                    <span><i class="fas fa-user-edit"></i> Edit Profile</span>
                    <i class="fas fa-chevron-right"></i>
                </a>
                <a href="help-center.html" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #e2e8f0; text-decoration: none; color: #374151;">
                    <span><i class="fas fa-question-circle"></i> Help Center</span>
                    <i class="fas fa-chevron-right"></i>
                </a>
                <a href="#" onclick="Auth.logout()" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; text-decoration: none; color: #dc2626;">
                    <span><i class="fas fa-sign-out-alt"></i> Sign Out</span>
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>
        </div>

        <div class="app-bottom-dock">
            <a href="consumer-dashboard.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-home"></i></span>
                <span>Home</span>
            </a>
            <a href="details.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-history"></i></span>
                <span>History</span>
            </a>
            <a href="#" class="dock-tab-link" onclick="Toast.info('Blockchain explorer coming soon!')">
                <span class="unselected-icon-spacing"><i class="fas fa-link"></i></span>
                <span>Ledger</span>
            </a>
            <a href="consumer_profile.html" class="dock-tab-link active-pill-state">
                <div class="pill-overlay-badge"><i class="fas fa-user"></i></div>
                <span>Profile</span>
            </a>
        </div>

    </div>

    <script src="../scripts/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Check authentication before loading page
            if (!checkAuthAndRedirect()) return;
            
            // Load user profile if available
            const user = Auth.getUser();
            if (user) {
                document.getElementById('user-name').textContent = user.username || 'User';
                document.getElementById('user-email').textContent = user.email || 'No email';
            }
        });
    </script>
</body>
</html>
