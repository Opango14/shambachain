<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Traceability Search Engine</title>
    <link rel="stylesheet" href="../styles/search-traceability.css?v=3">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FontAwesome Custom Styles -->
    <link rel="stylesheet" href="../styles/fontawesome-custom.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false }, prefix: 'tw-' }</script>
    <link rel="stylesheet" href="../styles/theme.css">
</head>
<body>

    <div class="phone-container">
        
        <div class="top-app-bar">
            <button class="menu-icon" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <div class="app-bar-title" id="app-title-txt"></div>
            <button class="qr-shortcut" onclick="window.location.href='scanner.html'"><i class="fas fa-qrcode"></i></button>
        </div>

        <h2 class="help-main-headline" id="display-headline-txt"></h2>

        <!-- Search Bar -->
        <div class="search-box-wrapper">
            <span class="search-icon-marker"><i class="fas fa-search"></i></span>
            <input type="text" id="traceSearchInput" class="search-query-input"
                placeholder="Enter batch ID to trace..."
                onkeydown="if(event.key==='Enter') executeSearch()">
            <button onclick="executeSearch()" id="btn-search"
                style="background:#022c22;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-left:8px;white-space:nowrap;">
                Search
            </button>
        </div>

        <!-- Filter Pills -->
        <div class="filter-capsules-row" id="filter-pills-container"></div>

        <!-- Search Result Panel (hidden by default) -->
        <div id="search-result-panel" style="display:none;margin-bottom:16px;">
            <div id="search-result-content"></div>
        </div>

        <div class="search-grid-layout-hub">
            
            <!-- COLUMN 1: Recent Searches -->
            <div>
                <div class="section-title-strip">
                    <h3 id="display-recent-lbl"></h3>
                    <span class="clear-action" onclick="clearRecentSearchesFeedLog(event)" style="cursor:pointer;">Clear Feed</span>
                </div>
                <div class="recent-searches-stack" id="recent-queries-container"></div>
            </div>

            <!-- COLUMN 2: Recommended Farms -->
            <div>
                <div class="section-title-strip">
                    <h3 id="display-recommend-lbl"></h3>
                </div>
                <div class="recommended-cards-viewport" id="recommended-farms-container"></div>
            </div>

        </div>

        <div class="app-bottom-dock">
            <a href="consumer-dashboard.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-home"></i></span>
                <span>Home</span>
            </a>
            <a href="details.html" class="dock-tab-link">
                <span class="unselected-icon-spacing"><i class="fas fa-history"></i></span>
                <span>History</span>
            </a>
            <a href="#" class="dock-tab-link" onclick="Toast.info('Blockchain explorer coming soon!')">
                <span class="unselected-icon-spacing"><i class="fas fa-link"></i></span>
                <span>Ledger</span>
            </a>
            <a href="consumer_profile.html" class="dock-tab-link active-pill-state">
                <div class="pill-overlay-badge"><i class="fas fa-search"></i></div>
                <span>Search</span>
            </a>
        </div>

    </div>

    <script src="../scripts/app.js"></script>
    <script>
        const searchConfig = {
            appName: "ShambaChain",
            headline: "Search Registry",
            recentLabel: "Recent Searches",
            recommendLabel: "Certified Producers"
        };

        const filterPillsPayload = [
            { label: "All Records", id: "all", isActive: true },
            { label: "Crop Batches", id: "batches", isActive: false },
            { label: "Verified Farms", id: "farms", isActive: false },
            { label: "Logistics Logs", id: "logistics", isActive: false }
        ];

        // Persisted in sessionStorage so it survives page refresh
        function getRecentSearches() {
            try { return JSON.parse(sessionStorage.getItem('sc_recent_searches') || '[]'); }
            catch { return []; }
        }
        function saveRecentSearch(query) {
            const list = getRecentSearches().filter(q => q !== query);
            list.unshift(query);
            sessionStorage.setItem('sc_recent_searches', JSON.stringify(list.slice(0, 8)));
        }

        const recommendedFarmsPayload = [
            { title: "Mutheka Co-operative", region: "<i class='fas fa-map-marker-alt'></i> Nyeri, Central Kenya", badge: "<i class='fas fa-check'></i> Certified", imgUrl: "https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=400&q=80&fit=crop" },
            { title: "Green Valley Farm", region: "<i class='fas fa-map-marker-alt'></i> Kisumu, Nyanza", badge: "<i class='fas fa-leaf'></i> Organic", imgUrl: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&q=80&fit=crop" },
            { title: "Kinangop Potato Coop", region: "<i class='fas fa-map-marker-alt'></i> Nyandarua, Rift Valley", badge: "<i class='fas fa-handshake'></i> FairTrade", imgUrl: "https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&q=80&fit=crop" },
        ];

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('app-title-txt').innerText = searchConfig.appName;
            document.getElementById('display-headline-txt').innerText = searchConfig.headline;
            document.getElementById('display-recent-lbl').innerText = searchConfig.recentLabel;
            document.getElementById('display-recommend-lbl').innerText = searchConfig.recommendLabel;

            // Filter pills
            const filterContainer = document.getElementById('filter-pills-container');
            filterContainer.innerHTML = '';
            filterPillsPayload.forEach(pill => {
                filterContainer.innerHTML += `
                    <button type="button" class="filter-pill-btn ${pill.isActive ? 'active-filter-state' : ''}"
                        onclick="setActiveFilter(this, '${pill.id}')">
                        ${pill.label}
                    </button>
                `;
            });

            renderRecentQueriesStackFeed();

            // Recommended farms
            const farmsContainer = document.getElementById('recommended-farms-container');
            farmsContainer.innerHTML = '';
            recommendedFarmsPayload.forEach(farm => {
                farmsContainer.innerHTML += `
                    <a href="farmer-profile.html" class="recommended-producer-card">
                        <div class="card-visual-header" style="background-image:url('${farm.imgUrl}');background-size:cover;background-position:center;">
                            <div class="badge-overlay-certified">${farm.badge}</div>
                        </div>
                        <div class="card-lower-body">
                            <div class="card-main-title-lbl">${farm.title}</div>
                            <div class="card-sub-metadata-lbl">${farm.region}</div>
                        </div>
                    </a>
                `;
            });

            // Pre-fill search if coming from scanner
            const prefill = sessionStorage.getItem('sc_scan_result');
            if (prefill) {
                document.getElementById('traceSearchInput').value = prefill;
                sessionStorage.removeItem('sc_scan_result');
                executeSearch();
            }
        });

        function setActiveFilter(el, id) {
            document.querySelectorAll('.filter-pill-btn').forEach(b => b.classList.remove('active-filter-state'));
            el.classList.add('active-filter-state');
        }

        function renderRecentQueriesStackFeed() {
            const container = document.getElementById('recent-queries-container');
            const searches = getRecentSearches();
            container.innerHTML = '';
            if (searches.length === 0) {
                container.innerHTML = `<div style="padding:12px;color:#94a3b8;font-size:13px;">No recent searches.</div>`;
                return;
            }
            searches.forEach(query => {
                container.innerHTML += `
                    <div class="search-history-item" onclick="document.getElementById('traceSearchInput').value='${query}';executeSearch();" style="cursor:pointer;">
                        <div class="history-item-left">
                            <span><i class="fas fa-search"></i></span> <span>${query}</span>
                        </div>
                        <span class="history-item-chevron"><i class="fas fa-chevron-right"></i></span>
                    </div>
                `;
            });
        }

        function clearRecentSearchesFeedLog(e) {
            e.preventDefault();
            sessionStorage.removeItem('sc_recent_searches');
            renderRecentQueriesStackFeed();
            Toast.info('Search history cleared.');
        }

        async function executeSearch() {
            const query = document.getElementById('traceSearchInput').value.trim();
            if (!query) {
                Toast.warning('Enter a batch ID to search.');
                return;
            }

            const resultPanel   = document.getElementById('search-result-panel');
            const resultContent = document.getElementById('search-result-content');
            const btn = document.getElementById('btn-search');

            saveRecentSearch(query);
            renderRecentQueriesStackFeed();

            Btn.setLoading(btn, true);
            resultPanel.style.display = 'block';
            resultContent.innerHTML = `
                <div style="padding:20px;text-align:center;color:#475569;font-size:14px;">
                    <i class="fas fa-search"></i> Searching blockchain records for <strong>${query}</strong>...
                </div>`;

            try {
                const data = await Http.get(`/trace/${encodeURIComponent(query)}`);
                renderTraceResult(data, query);
            } catch (err) {
                resultContent.innerHTML = `
                    <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:20px;text-align:center;">
                        <div style="font-size:24px;margin-bottom:8px;"><i class="fas fa-search"></i></div>
                        <div style="font-weight:600;color:#991b1b;margin-bottom:4px;">Batch Not Found</div>
                        <div style="color:#b91c1c;font-size:13px;">${err.message || 'No records found for this batch ID.'}</div>
                    </div>`;
                Toast.error('Batch not found in registry.');
            } finally {
                Btn.setLoading(btn, false);
            }
        }

        function renderTraceResult(data, query) {
            const resultContent = document.getElementById('search-result-content');
            const batch = data.batch || data;
            const events = data.events || data.supply_chain || [];

            resultContent.innerHTML = `
                <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:20px;margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
                        <div>
                            <div style="font-size:11px;font-weight:700;color:#22c55e;letter-spacing:1px;margin-bottom:4px;"><i class="fas fa-check"></i> VERIFIED ON-CHAIN</div>
                            <div style="font-size:18px;font-weight:800;color:#022c22;">${batch.produce_type || batch.ProduceType || query}</div>
                            <div style="font-size:13px;color:#475569;margin-top:2px;">
                                <i class="fas fa-map-marker-alt"></i> ${batch.location || batch.Location || '—'} &nbsp;·&nbsp;
                                <i class="fas fa-seedling"></i> ${batch.farm_name || batch.FarmName || '—'}
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:11px;color:#64748b;">Batch ID</div>
                            <div style="font-size:13px;font-weight:700;color:#022c22;font-family:monospace;">${batch.batch_id || batch.id || query}</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;">
                        <div style="font-size:12px;color:#475569;"><i class="fas fa-weight-hanging"></i> <strong>${batch.quantity || batch.Quantity || '—'} ${batch.unit || batch.Unit || 'kg'}</strong></div>
                        <div style="font-size:12px;color:#475569;"><i class="fas fa-calendar-alt"></i> <strong>${batch.harvest_date ? new Date(batch.harvest_date).toLocaleDateString() : '—'}</strong></div>
                    </div>
                    ${events.length > 0 ? `
                    <div style="margin-top:16px;border-top:1px solid #bbf7d0;padding-top:12px;">
                        <div style="font-size:12px;font-weight:700;color:#022c22;margin-bottom:8px;">Supply Chain Events (${events.length})</div>
                        ${events.map(ev => `
                            <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;">
                                <div style="width:8px;height:8px;border-radius:50%;background:#22c55e;margin-top:4px;flex-shrink:0;"></div>
                                <div>
                                    <div style="font-size:12px;font-weight:600;color:#022c22;">${ev.event_type || ev.EventType || '—'}</div>
                                    <div style="font-size:11px;color:#64748b;">${ev.created_at ? new Date(ev.created_at).toLocaleString() : ''}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>` : ''}
                    <a href="details.html" style="display:inline-block;margin-top:12px;background:#022c22;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;">
                        View Full Details →
                    </a>
                </div>
            `;
            Toast.success('Batch found on blockchain!');
        }
    </script>
</body>
</html>
