<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShambaChain - Settings</title>
    <link rel="stylesheet" href="../styles/settings.css">
</head>
<body>

    <div class="phone-container">
        
        <!-- Global Top App Navigation Row Bar -->
        <div class="top-app-bar">
            <button class="menu-icon" onclick="window.location.href='farmer-portal.html'">☰</button>
            <div class="app-bar-title">ShambaChain</div>
            <button class="profile-shortcut" onclick="window.location.href='farmer-profile.html'">👤</button>
        </div>

        <!-- Page Introduction Block Header -->
        <h1 class="settings-main-title">Settings</h1>
        <p class="settings-subtext-para">Manage your account and app preferences.</p>

        <!-- CATEGORY 1: ACCOUNT -->
        <div class="settings-category-lbl">Account</div>
        <div class="settings-group-card">
            <a href="#" class="settings-row-item">
                <div class="settings-left-block">
                    <span class="settings-icon-marker">👤</span>
                    <span class="settings-item-text">Edit Profile</span>
                </div>
                <span class="settings-chevron-arrow">&gt;</span>
            </a>
            <a href="#" class="settings-row-item">
                <div class="settings-left-block">
                    <span class="settings-icon-marker">🔄</span>
                    <span class="settings-item-text">Change Password</span>
                </div>
                <span class="settings-chevron-arrow">&gt;</span>
            </a>
        </div>

        <!-- CATEGORY 2: SECURITY -->
        <div class="settings-category-lbl">Security</div>
        <div class="settings-group-card">
            <a href="#" class="settings-row-item">
                <div class="settings-left-block">
                    <span class="settings-icon-marker">🔏</span>
                    <span class="settings-item-text">Blockchain Wallet</span>
                </div>
                <div class="settings-right-block">
                    <span class="connected-pill-status">Connected</span>
                    <span class="settings-chevron-arrow">&gt;</span>
                </div>
            </a>
            <a href="#" class="settings-row-item">
                <div class="settings-left-block">
                    <span class="settings-icon-marker">🛡️</span>
                    <span class="settings-item-text">Two-Factor Auth</span>
                </div>
                <span class="settings-chevron-arrow">&gt;</span>
            </a>
        </div>

        <!-- CATEGORY 3: NOTIFICATIONS -->
        <div class="settings-category-lbl">Notifications</div>
        <div class="settings-group-card">
            <a href="#" class="settings-row-item">
                <div class="settings-left-block">
                    <span class="settings-icon-marker">🔔</span>
                    <span class="settings-item-text">Push</span>
                </div>
                <span class="settings-chevron-arrow">&gt;</span>
            </a>
            <a href="#" class="settings-row-item">
                <div class="settings-left-block">
                    <span class="settings-icon-marker">✉️</span>
                    <span class="settings-item-text">Email</span>
                </div>
                <span class="settings-chevron-arrow">&gt;</span>
            </a>
        </div>

        <!-- CATEGORY 4: SUPPORT -->
        <div class="settings-category-lbl">Support</div>
        <div class="settings-group-card">
            <a href="#" class="settings-row-item">
                <div class="settings-left-block">
                    <span class="settings-icon-marker">❓</span>
                    <span class="settings-item-text">Help Center</span>
                </div>
                <span class="settings-chevron-arrow">&gt;</span>
            </a>
            <a href="#" class="settings-row-item">
                <div class="settings-left-block">
                    <span class="settings-icon-marker">📞</span>
                    <span class="settings-item-text">Contact Us</span>
                </div>
                <span class="settings-chevron-arrow">&gt;</span>
            </a>
        </div>

        <!-- High-Contrast Outlined Sign Out Trigger Button -->
        <a href="login.html" class="btn-signout-outline">
            <span>🚪</span> Sign Out
        </a>

        <!-- Sticky Persistent Profile Settings Bottom Menu Bar Dock Layout -->
        <div class="app-bottom-dock">
            
            <!-- Tab 1: Trace -->
            <a href="farmer-portal.html" class="dock-tab-link">
                <span class="unselected-icon-spacing">🔳</span>
                <span>Trace</span>
            </a>

            <!-- Tab 2: Impact -->
            <a href="#" class="dock-tab-link">
                <span class="unselected-icon-spacing">📊</span>
                <span>Impact</span>
            </a>

            <!-- Tab 3: Profile -->
            <a href="farmer-profile.html" class="dock-tab-link">
                <span class="unselected-icon-spacing">👤</span>
                <span>Profile</span>
            </a>

            <!-- Tab 4: Settings (Active configuration highlight badge) -->
            <a href="settings.html" class="dock-tab-link active-pill-state">
                <div class="pill-overlay-badge">⚙️</div>
                <span>Settings</span>
            </a>

        </div>

    </div>

</body>
</html>
